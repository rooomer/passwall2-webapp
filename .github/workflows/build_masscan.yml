name: Build Masscan for OpenWrt ARMv7

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build_masscan.yml'

jobs:
  build:
    name: Build Masscan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Masscan
        run: git clone --depth 1 https://github.com/robertdavidgraham/masscan.git

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v3

      - name: Compile statically in ARMv7 Alpine (musl)
        run: |
          docker run --rm --platform linux/arm/v7 -v ${{ github.workspace }}/masscan:/masscan -w /masscan alpine:latest sh -c "
            apk add --no-cache build-base linux-headers &&
            make -j4 CC='gcc -static' CFLAGS='-O3' LDFLAGS='-static'
          "

      - name: Zip Binary
        run: zip -j masscan-armv7-openwrt.zip masscan/bin/masscan

      - name: Upload Binary as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: masscan-armv7-openwrt
          path: masscan/bin/masscan

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Masscan OpenWrt ARMv7 Build ${{ github.run_number }}
          files: masscan-armv7-openwrt.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
