name: Build Slipstream Client (OpenWrt musl)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout slipstream-rust source
        uses: actions/checkout@v4
        with:
          repository: Mygod/slipstream-rust
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools cmake perl

      - name: Install Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build slipstream-client (x86_64 musl)
        run: |
          export CC=musl-gcc
          export OPENSSL_STATIC=1
          cargo build --release --target x86_64-unknown-linux-musl -p slipstream-client --features openssl-vendored
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-client-linux-amd64-musl
          path: target/x86_64-unknown-linux-musl/release/slipstream-client

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout slipstream-rust source
        uses: actions/checkout@v4
        with:
          repository: Mygod/slipstream-rust
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in Alpine arm64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            alpine:edge sh -c '
              apk add --no-cache curl gcc g++ musl-dev cmake make perl \
                openssl-dev openssl-libs-static git bash pkgconf linux-headers
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source $HOME/.cargo/env
              export OPENSSL_STATIC=1
              export RUSTFLAGS="-C target-feature=+crt-static"
              cargo build --release -p slipstream-client
              cp target/release/slipstream-client /workspace/slipstream-client-arm64
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-client-linux-arm64-musl
          path: slipstream-client-arm64

  release:
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in slipstream-client-*; do
            if [ -d "$dir" ]; then
              for f in "$dir"/*; do
                cp "$f" "release/$dir"
                chmod +x "release/$dir"
              done
            fi
          done
          ls -la release/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: slipstream-latest
          name: "Slipstream Client (OpenWrt musl builds)"
          body: |
            Automatically built `slipstream-client` binaries for OpenWrt (musl libc).
            Statically linked — ready to run on OpenWrt routers.

            | File | Architecture |
            |------|-------------|
            | `slipstream-client-linux-amd64-musl` | x86_64 |
            | `slipstream-client-linux-arm64-musl` | aarch64 (ARM64) |
          files: release/*
          prerelease: false
          make_latest: true
