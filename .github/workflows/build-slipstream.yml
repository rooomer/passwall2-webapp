name: Build Slipstream Client (OpenWrt musl)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'  # Weekly on Sunday

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: slipstream-client-linux-amd64-musl
          - target: aarch64-unknown-linux-musl
            artifact: slipstream-client-linux-arm64-musl

    steps:
      - name: Checkout slipstream-rust source
        uses: actions/checkout@v4
        with:
          repository: Mygod/slipstream-rust
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Create Cross.toml for musl OpenSSL
        run: |
          cat > Cross.toml << 'EOF'
          [target.x86_64-unknown-linux-musl]
          pre-build = [
            "DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends cmake perl"
          ]

          [target.aarch64-unknown-linux-musl]
          pre-build = [
            "DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends cmake perl"
          ]
          EOF

      - name: Build slipstream-client
        run: cross build --release --target ${{ matrix.target }} -p slipstream-client --features openssl-vendored
        env:
          CROSS_CONTAINER_OPTS: "--platform linux/amd64"
          OPENSSL_STATIC: "1"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/slipstream-client

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in slipstream-client-*; do
            if [ -d "$dir" ]; then
              cp "$dir/slipstream-client" "release/$dir"
              chmod +x "release/$dir"
            fi
          done
          ls -la release/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: slipstream-latest
          name: "Slipstream Client (OpenWrt musl builds)"
          body: |
            Automatically built `slipstream-client` binaries for OpenWrt (musl libc).
            These are statically linked and ready to run on OpenWrt routers.

            | File | Architecture |
            |------|-------------|
            | `slipstream-client-linux-amd64-musl` | x86_64 |
            | `slipstream-client-linux-arm64-musl` | aarch64 (ARM64) |
          files: release/*
          prerelease: false
          make_latest: true

