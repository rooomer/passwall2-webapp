name: Build Slipstream Client (OpenWrt musl)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            docker_platform: linux/amd64
            artifact: slipstream-client-linux-amd64-musl
          - arch: arm64
            docker_platform: linux/arm64
            artifact: slipstream-client-linux-arm64-musl
          - arch: armv7
            docker_platform: linux/arm/v7
            artifact: slipstream-client-linux-armv7-musl

    steps:
      - name: Checkout slipstream-rust source
        uses: actions/checkout@v4
        with:
          repository: Mygod/slipstream-rust
          submodules: recursive

      - name: Set up QEMU (for ARM builds)
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v3

      - name: Build in Alpine container
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            alpine:edge sh -ex -c '
              apk add --no-cache curl gcc g++ musl-dev cmake make perl \
                openssl-dev openssl-libs-static git bash pkgconf linux-headers

              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
              source $HOME/.cargo/env

              export OPENSSL_STATIC=1

              cargo build --release -p slipstream-client

              cp target/release/slipstream-client /workspace/${{ matrix.artifact }}
              chmod 777 /workspace/${{ matrix.artifact }}
            '

      - name: Verify artifact exists
        run: |
          ls -la ${{ matrix.artifact }}
          file ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in slipstream-client-*; do
            if [ -d "$dir" ]; then
              mv "$dir"/* "release/$dir"
              chmod +x "release/$dir"
            fi
          done
          ls -la release/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: slipstream-latest
          name: "Slipstream Client (OpenWrt musl builds)"
          body: |
            Automatically built `slipstream-client` binaries for OpenWrt (musl libc).
            Statically linked — ready to run on OpenWrt routers.

            | File | Architecture |
            |------|-------------|
            | `slipstream-client-linux-amd64-musl` | x86_64 |
            | `slipstream-client-linux-arm64-musl` | aarch64 (ARM64) |
            | `slipstream-client-linux-armv7-musl` | ARMv7 (armhf/armv7l) |
          files: release/*
          prerelease: false
          make_latest: true
